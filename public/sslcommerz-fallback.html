<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { color: #374151; margin-bottom: 10px; }
        p { color: #6b7280; margin-bottom: 30px; }
        .status { color: #10b981; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Processing Payment</h1>
        <p>Please wait while we process your payment response...</p>
        <div class="status">Redirecting to success page...</div>
    </div>

    <script>
        // Try to detect if we're in a blocked page scenario
        try {
            // If we can access parent window, try to redirect it
            if (window.parent && window.parent !== window) {
                window.parent.location.href = "/payment/success";
            } else {
                // Direct redirect
                window.location.href = "/payment/success";
            }
        } catch (e) {
            // If we can't access parent (blocked), redirect directly
            window.location.href = "/payment/success";
        }

        // Fallback redirect after 3 seconds
        setTimeout(function() {
            window.location.href = "/payment/success";
        }, 3000);
    </script>
</body>
</html>
